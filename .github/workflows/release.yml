name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # Quick checks that fail fast
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --features "native,neural" -- -D warnings

  # Version consistency check
  version-check:
    name: Version Consistency Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          # Extract version from Cargo.toml
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Cargo.toml version: $CARGO_VERSION"

          # Extract version from git tag
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "Git tag version: $TAG_VERSION"

          # Compare versions
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ ERROR: Version mismatch!"
            echo "  Cargo.toml: $CARGO_VERSION"
            echo "  Git tag:    v$TAG_VERSION"
            exit 1
          fi

          echo "✅ Versions match: $CARGO_VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build binary
        run: cargo build --release

      - name: Verify binary version matches
        run: |
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          BINARY_VERSION=$(./target/release/narsil-mcp --version | sed 's/narsil-mcp //')

          echo "Cargo.toml version: $CARGO_VERSION"
          echo "Binary --version:   $BINARY_VERSION"

          if [ "$BINARY_VERSION" != "$CARGO_VERSION" ]; then
            echo "❌ ERROR: Binary version mismatch!"
            echo "  Cargo.toml: $CARGO_VERSION"
            echo "  Binary:     $BINARY_VERSION"
            exit 1
          fi

          echo "✅ Binary version matches: $BINARY_VERSION"

  # Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [lint, version-check]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run security audit
        run: cargo audit

  # Verify tests pass before releasing
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint, version-check]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          cache-on-failure: true

      - name: Run tests
        run: cargo test --features "native,neural" --verbose -- --test-threads=1

  # Publish to crates.io (skip for pre-release versions)
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [lint, version-check, security, test]
    timeout-minutes: 20
    # Only publish to crates.io for stable releases (not beta, alpha, rc, etc.)
    if: "!contains(github.ref, '-beta') && !contains(github.ref, '-alpha') && !contains(github.ref, '-rc')"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          cache-on-failure: true

      - name: Publish to crates.io
        # --allow-dirty because Cargo.lock is auto-updated by cargo build and may differ slightly
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} --allow-dirty

  # Build release binaries for all platforms
  build-binaries:
    name: Build Release Binaries
    needs: [lint, security, test]
    uses: ./.github/workflows/build-binaries.yml

  # Create GitHub Release with all binaries
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    # Only depend on publish for non-beta releases, always depend on build-binaries
    needs: [build-binaries]
    if: always() && needs.build-binaries.result == 'success'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          # Get version from tag (remove 'v' prefix)
          VERSION=${GITHUB_REF#refs/tags/v}

          # Get absolute path to release-assets directory
          RELEASE_DIR="$(pwd)/release-assets"

          for dir in artifacts/*/; do
            artifact_name=$(basename "$dir")

            if [[ "$artifact_name" == *"windows"* ]]; then
              # Windows: Create .zip
              (cd "$dir" && zip "${RELEASE_DIR}/narsil-mcp-v${VERSION}-${artifact_name}.zip" narsil-mcp.exe)
              # Generate SHA256
              (cd release-assets && shasum -a 256 "narsil-mcp-v${VERSION}-${artifact_name}.zip" > "narsil-mcp-v${VERSION}-${artifact_name}.zip.sha256")
            else
              # Unix: Create .tar.gz
              (cd "$dir" && tar -czf "${RELEASE_DIR}/narsil-mcp-v${VERSION}-${artifact_name}.tar.gz" narsil-mcp)
              # Generate SHA256
              (cd release-assets && shasum -a 256 "narsil-mcp-v${VERSION}-${artifact_name}.tar.gz" > "narsil-mcp-v${VERSION}-${artifact_name}.tar.gz.sha256")
            fi
          done

          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish to npm (after GitHub Release so binaries are available)
  npm-publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [release]
    if: "!contains(github.ref, '-beta') && !contains(github.ref, '-alpha') && !contains(github.ref, '-rc')"
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync npm package version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cd npm
          # Update version in package.json
          node -e "
            const pkg = require('./package.json');
            pkg.version = '$VERSION';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Updated npm/package.json to version $VERSION"
          cat package.json

      - name: Publish to npm
        run: |
          cd npm
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
